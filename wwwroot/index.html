<body style="background-image: linear-gradient(to left,#827878,#000000); height: 100vh ">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text" style="color:white"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a href="" class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let IsMobile;
        window.onload = function () {
            IsMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(navigator.userAgent);
        };
        function isDevice() {
            return IsMobile;
        }

        window.scrollToFragment = (elementId) => {
            const element = document.getElementById(elementId);
            if (element) {
                const yOffset = -150; 
                const y = element.getBoundingClientRect().top + window.scrollY + yOffset;

                window.scrollTo({ top: y, behavior: 'smooth' });
            }
        }
    </script>
